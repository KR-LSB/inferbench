# InferBench Prometheus Configuration

global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: "vllm"
    static_configs:
      - targets: ["vllm-server:8000"]
    metrics_path: /metrics

  - job_name: "inferbench"
    static_configs:
      - targets: ["benchmark-runner:9100"]
    metrics_path: /metrics
